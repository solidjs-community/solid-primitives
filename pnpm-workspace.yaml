packages:
  - packages/*
  - site

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: false

minimumReleaseAgeExclude:
  - '@solidjs/signals@2.0.0-beta.17'
  - '@solidjs/web@2.0.0-beta.17'
  - solid-js@2.0.0-beta.17
  - '@dom-expressions/babel-plugin-jsx@0.50.0-next.17'
  - babel-preset-solid@2.0.0-beta.17

onlyBuiltDependencies:
  - "@parcel/watcher"
  - esbuild

catalog:
  tsdown: ^0.22.3
  unplugin-solid: ^1.0.0
