packages:
  - packages/*
  - site

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: false

minimumReleaseAgeExclude:
  - '@solidjs/signals@2.0.0-beta.16'
  - '@solidjs/web@2.0.0-beta.16'
  - solid-js@2.0.0-beta.16

onlyBuiltDependencies:
  - "@parcel/watcher"
  - esbuild

catalog:
  tsdown: ^0.22.3
  unplugin-solid: ^1.0.0
  