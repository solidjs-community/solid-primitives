packages:
  - packages/*
  - site

overrides:
  react: 19.2.7
  react-dom: 19.2.7

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  sharp: false

minimumReleaseAgeExclude:
  - '@solidjs/signals@2.0.0-beta.20'
  - '@solidjs/web@2.0.0-beta.20'
  - solid-js@2.0.0-beta.20
  - '@dom-expressions/babel-plugin-jsx@0.50.0-next.23'
  - babel-preset-solid@2.0.0-beta.20

onlyBuiltDependencies:
  - "@parcel/watcher"
  - esbuild

catalog:
  tsdown: ^0.22.3
  unplugin-solid: ^1.0.0
  solid-js: 2.0.0-beta.20
  '@solidjs/web': 2.0.0-beta.20
  '@solidjs/signals': 2.0.0-beta.20
  babel-preset-solid: 2.0.0-beta.20
  '@babel/core': ^7.29.7

catalogs:
  peer:
    solid-js: ^2.0.0-beta.20
    '@solidjs/web': ^2.0.0-beta.20
